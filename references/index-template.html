<!--
  INDEX TEMPLATE — learn-as-you-ship
  
  Regenerate this file in tutor_me/index.html after every 5 lessons,
  or when the user asks to see progress. Same dark theme as lessons.
  Replace {{...}} placeholders with actual data.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Learning Journey | Learn As You Ship</title>
<style>
  :root {
    --bg: #0f1117;
    --bg-raised: #161922;
    --bg-card: #1a1e2a;
    --border: #2a2f3e;
    --text: #c9d1d9;
    --text-muted: #7d8590;
    --text-bright: #e6edf3;
    --accent: #58a6ff;
    --accent-dim: #1f3a5f;
    --green: #3fb950;
    --orange: #d29922;
    --purple: #bc8cff;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    --font-mono: "SF Mono", "Cascadia Code", "Fira Code", Consolas, monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 16px;
    line-height: 1.7;
    max-width: 820px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
    animation: fadeIn 0.4s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .header {
    text-align: center;
    margin-bottom: 2.5rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--border);
  }
  .header .brand {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 0.75rem;
  }
  .header h1 {
    font-size: 2rem;
    color: var(--text-bright);
    font-weight: 700;
    margin-bottom: 0.5rem;
  }
  .header .subtitle {
    color: var(--text-muted);
    font-size: 0.95rem;
  }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    margin: 1.5rem 0;
    flex-wrap: wrap;
  }
  .stat {
    text-align: center;
  }
  .stat .num {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--text-bright);
    font-family: var(--font-mono);
  }
  .stat .label {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Tool sections */
  .tool-section {
    margin: 2rem 0;
  }
  .tool-heading {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }
  .tool-heading h2 {
    font-size: 1.15rem;
    font-weight: 600;
    color: var(--text-bright);
    margin: 0;
  }
  .tool-heading .count {
    background: var(--accent-dim);
    color: var(--accent);
    padding: 0.15rem 0.55rem;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 600;
  }

  /* Lesson cards */
  .lesson-card {
    display: block;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem 1.25rem;
    margin-bottom: 0.6rem;
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.2s, background 0.2s;
  }
  .lesson-card:hover {
    border-color: var(--accent);
    background: var(--bg-raised);
    text-decoration: none;
  }
  .lesson-card .lesson-id {
    font-family: var(--font-mono);
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-right: 0.75rem;
  }
  .lesson-card .lesson-title {
    font-weight: 600;
    color: var(--text-bright);
  }
  .lesson-card .lesson-summary {
    font-size: 0.88rem;
    color: var(--text-muted);
    margin-top: 0.3rem;
  }

  .footer {
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    text-align: center;
    font-size: 0.8rem;
    color: var(--text-muted);
  }
  .footer a { color: var(--accent); text-decoration: none; }

  @media (max-width: 600px) {
    body { padding: 1.25rem 1rem 3rem; }
    .header h1 { font-size: 1.5rem; }
    .stats { gap: 1rem; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="brand">Learn As You Ship</div>
  <h1>My Learning Journey</h1>
  <p class="subtitle">Lessons generated from real code in this project</p>

  <div class="stats">
    <div class="stat">
      <div class="num">{{TOTAL_LESSONS}}</div>
      <div class="label">Lessons</div>
    </div>
    <div class="stat">
      <div class="num">{{TOTAL_TOOLS}}</div>
      <div class="label">Tools</div>
    </div>
    <div class="stat">
      <div class="num">{{DAYS_LEARNING}}</div>
      <div class="label">Days</div>
    </div>
  </div>
</div>

<!--
  Repeat this block for each tracked tool.
  Sort tools alphabetically. Within each tool, list lessons in order.
-->
<div class="tool-section">
  <div class="tool-heading">
    <h2>{{TOOL_NAME}}</h2>
    <span class="count">{{TOOL_LESSON_COUNT}} lessons</span>
  </div>

  <a href="./{{LESSON_FILENAME}}" class="lesson-card">
    <span class="lesson-id">#{{LESSON_NUMBER}}</span>
    <span class="lesson-title">{{LESSON_TITLE}}</span>
    <div class="lesson-summary">{{ONE_LINE_SUMMARY}}</div>
  </a>
  <!-- Repeat .lesson-card for each lesson under this tool -->
</div>

<div class="footer">
  <p>Generated by <a href="https://github.com/{{YOUR_GITHUB}}/learn-as-you-ship">learn-as-you-ship</a></p>
</div>

</body>
</html>
